name: SonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    # Skip Sonar for PRs originating from forks — secrets are not available there.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for accurate blame information and new-code detection.
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build, test and analyze
        run: >
          mvn --batch-mode --no-transfer-progress verify sonar:sonar
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'frfrisby_frisby-web' }}
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'frfrisby' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

