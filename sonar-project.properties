# SonarCloud rule suppressions
#
# Rules suppressed here are intentional design decisions, not quality gaps.
# Each entry includes a justification.
#
# Format:
#   sonar.issue.ignore.multicriteria=<id>[,<id>,...]
#   sonar.issue.ignore.multicriteria.<id>.ruleKey=<rule>
#   sonar.issue.ignore.multicriteria.<id>.resourceKey=<glob>

sonar.issue.ignore.multicriteria=e1

# S110 — Inheritance tree of classes should not be too deep.
# Exception hierarchies are a canonical case where depth is intentional.
# Our hierarchy (Throwable → Exception → RuntimeException → HttpResponseException
# → ClientException/ServerException → specific exception) is exactly the right
# depth for a typed HTTP exception hierarchy — it enables catch (ClientException),
# catch (HttpResponseException), etc.  Flattening it would remove that capability.
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S110
sonar.issue.ignore.multicriteria.e1.resourceKey=**/exception/**

