# ---------------------------------------------------------------------------
# JUL configuration for server module unit tests
#
# System.Logger uses JUL as its backend by default.  This file configures
# a single ConsoleHandler on the root logger so that every log message
# written during a test run also appears on stderr.
#
# The CapturingHandler (installed by HandlerManager at test runtime) runs
# alongside this ConsoleHandler: both receive every log record.
#
# slf4j-jdk14 bridges Jetty's SLF4J output into JUL.  The framework logger
# namespaces below are capped at WARNING so that verbose Jetty/Jersey/HK2
# startup chatter does not appear in the console or inflate the
# CapturingHandler's event counts during log-assertion tests.
# ---------------------------------------------------------------------------

# Root handler - a single ConsoleHandler writes to stderr
handlers = java.util.logging.ConsoleHandler

# Let all levels through at the root; individual loggers are narrowed
# programmatically by SystemLogVerifier when a test invokes configure()
.level = ALL

# ConsoleHandler: accept everything and use TestLogFormatter for readable output
java.util.logging.ConsoleHandler.level     = ALL
java.util.logging.ConsoleHandler.formatter = software.frisby.web.test.log.TestLogFormatter

# Suppress verbose framework logging - only WARNING and above from these namespaces
org.eclipse.jetty.level    = WARNING
org.glassfish.jersey.level = WARNING
org.glassfish.hk2.level    = WARNING
org.jvnet.hk2.level        = WARNING

# Jersey logs a WARNING at startup when jakarta.activation.DataSource is absent
# (the provider is optional and unused here - suppress to avoid noise).
org.glassfish.jersey.message.internal.MessagingBinders.level = SEVERE
